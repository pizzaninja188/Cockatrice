syntax = "proto3";

package ruled.v1;

// Intent from a client; carried inside GameCommand Command_RuledPayload.payload
message RuledCommand {
  oneof cmd {
    PassPriority pass_priority = 1;
    CastSpell cast_spell = 2;
    PlayLand play_land = 3;
    MulliganDecision mulligan = 4;
    Concede concede = 5;
    DeclareAttackers declare_attackers = 6;
    DeclareBlockers declare_blockers = 7;
    // Cockatrice "pass turn" in ruled mode: one empty-stack structural advance
    // (active player outside declare blockers; defender during declare blockers).
    PrimitiveYieldStructured primitive_yield_structured = 8;
  }
}

message PassPriority {}

message PrimitiveYieldStructured {}

message CastSpell {
  uint32 hand_card_index = 1;
  repeated TargetRef targets = 2;
}

message TargetRef {
  uint32 object_id = 1;
}

message PlayLand {
  uint32 hand_card_index = 1;
}

message MulliganDecision {
  bool keep = 1;
}

message Concede {}

// Active player names creatures on their battlefield to attack. Empty = no attack.
message DeclareAttackers {
  repeated uint32 creature_ids = 1;
}

message BlockPair {
  uint32 attacker_id = 1;
  uint32 blocker_id = 2;
}

// Defending player assigns at most one blocker per attacking creature (M2).
message DeclareBlockers {
  repeated BlockPair block_pairs = 1;
}

// Engine output batch; carried inside GameEvent Event_RuledPayload.payload
message RuledEventBatch {
  repeated RuledEvent events = 1;
  map<int32, LegalActions> legal_by_player = 2;
}

message LegalActions {
  repeated string labels = 1;
}

message RuledEvent {
  oneof ev {
    PhaseChanged phase_changed = 1;
    PriorityChanged priority_changed = 2;
    StackPushed stack_pushed = 3;
    StackResolved stack_resolved = 4;
    SbasApplied sbas_applied = 5;
    GameSnapshot snapshot = 6;
    ReplayState replay_state = 7;
    LogMessage log = 8;
    ZoneViewSync zone_view = 9;
    PermanentMoved permanent_moved = 10;
    LifeChanged life_changed = 11;
    BattlefieldObjectMap battlefield_object_map = 12;
    AttackersDeclared attackers_declared = 13;
  }
}

message PhaseChanged {
  string phase = 1;
  int32 active_player_id = 2;
}

message PriorityChanged {
  int32 player_id = 1;
}

message StackPushed {
  uint32 object_id = 1;
  string description = 2;
}

// Where the resolved spell object ends up (Servatrice maps this to TABLE vs GRAVE).
enum StackResolveDestination {
  STACK_RESOLVE_DESTINATION_UNSPECIFIED = 0; // legacy: server may infer from Oracle text
  STACK_RESOLVE_DESTINATION_GRAVEYARD = 1;
  STACK_RESOLVE_DESTINATION_BATTLEFIELD = 2;
}

message StackResolved {
  uint32 object_id = 1;
  StackResolveDestination destination = 2;
}

message SbasApplied {
  string description = 1;
}

// Authoritative hand + library from the rules engine, for server to sync physical zones
// (tricRules ids: lowercase_underscore, matching deck conversion).
// Library: comma-separated, top of library (next draw) first. TricRules ids never contain commas.
// Field 3 is reserved: older tricerules emitted repeated string there; same tag as singular string
// on the C++ side merged 53 submessages into one wrong value. Use 4+ only for the CSV.
message RuledPerPlayerView {
  int32 player_id = 1;
  repeated string hand = 2;
  reserved 3;
  string lib_ids_csv = 4;
  // Battlefield card ids in controller order (tricerules ids, lowercase_underscore).
  repeated string battlefield = 5;
  // Parallel array to `battlefield`, true if that permanent is tapped.
  repeated bool battlefield_tapped = 6;
  // Parallel array to `battlefield`: engine-owned ObjectId for each permanent.
  // Stable for the lifetime of the permanent on the battlefield. Used to map
  // server-side Server_Card instances to engine objects for combat intents.
  repeated uint32 battlefield_object_id = 7;
  // Parallel array to `battlefield`, true if that permanent is summoning sick.
  repeated bool battlefield_summoning_sick = 8;
}

message ZoneViewSync {
  repeated RuledPerPlayerView per_player = 1;
}

message GameSnapshot {
  string summary = 1;
}

message ReplayState {
  uint64 seed = 1;
  uint64 command_index = 2;
}

message LogMessage {
  string text = 1;
}

// A permanent left the battlefield (currently only graveyard via SBAs / destroy effects).
// Servers translate this into a Cockatrice moveCard from TABLE to the destination zone.
message PermanentMoved {
  uint32 object_id = 1;
  int32 owner_player_id = 2;
  enum Destination {
    DESTINATION_UNSPECIFIED = 0;
    DESTINATION_GRAVEYARD = 1;
    DESTINATION_HAND = 2;
    DESTINATION_LIBRARY = 3;
    DESTINATION_EXILE = 4;
  }
  Destination destination = 3;
}

// A player's life total changed. delta is signed (negative = loss).
message LifeChanged {
  int32 player_id = 1;
  int32 new_total = 2;
  int32 delta = 3;
}

// Server-built mapping (not engine-emitted) so clients can map a CardItem (whose
// id is the Server_Card id on the wire) to the corresponding engine ObjectId.
// Sent alongside ruled batches whenever battlefield membership changes.
message BattlefieldObjectMap {
  message Entry {
    int32 player_id = 1;
    uint32 engine_object_id = 2;
    // tricerules card id (lowercase_underscore)
    string card_id = 3;
    // 0-based position within the controller's battlefield
    uint32 ordinal = 4;
    // Server_Card.id for the same permanent on the Cockatrice side; -1 if unknown.
    int32 server_card_id = 5;
    // True if this permanent currently has summoning sickness.
    bool summoning_sick = 6;
  }
  repeated Entry entries = 1;
}

// Engine-emitted after a successful set_attackers; lists the attacking creatures
// so defenders' clients can highlight attackers (also drives Event_SetCardAttr
// (AttrAttacking) translation server-side).
message AttackersDeclared {
  int32 attacking_player_id = 1;
  repeated uint32 attacker_object_ids = 2;
}

// --- Sidecar TCP framing (length-prefixed IpcEnvelope) ---

message IpcEnvelope {
  oneof msg {
    SessionStart session_start = 1;
    PlayerCommand player_command = 2;
    SessionEnd session_end = 3;
  }
}

// Card ids for tricerules (lowercase_underscore, e.g. "lightning_bolt") — empty = engine default test deck
message PlayerDeck {
  int32 player_id = 1;
  repeated string mainboard_card_id = 2;
}

message SessionStart {
  uint64 game_id = 1;
  uint64 seed = 2;
  repeated int32 player_ids = 3;
  repeated PlayerDeck player_decks = 4;
}

message PlayerCommand {
  int32 player_id = 1;
  bytes ruled_command = 2;
}

message SessionEnd {}

message IpcResponse {
  bool ok = 1;
  string error = 2;
  optional RuledEventBatch batch = 3;
}
